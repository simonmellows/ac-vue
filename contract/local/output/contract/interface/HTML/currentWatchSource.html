<template id="contract.currentSource.currentWatchSource">
	<div id="currentSource.currentWatchSource">
	 	<span data-ch5-textcontent="currentWatchSource.labelFb">Label</span>
	 	<span data-ch5-textcontent="currentWatchSource.typeFb">Label</span>
	 	<span data-ch5-textcontent="currentWatchSource.iconFb">Label</span>
	 		<ch5-button sendEventOnClick="currentWatchSource.play" receiveStateSelected="currentWatchSource.playFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentWatchSource.stop" receiveStateSelected="currentWatchSource.stopFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentWatchSource.pause" receiveStateSelected="currentWatchSource.pauseFb">
        	</ch5-button>
	 </div>
</template>
