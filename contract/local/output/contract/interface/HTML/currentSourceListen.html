<template id="contract.currentSource.currentSourceListen">
	<div id="currentSource.currentSourceListen">
	 	<span data-ch5-textcontent="currentSourceListen.labelFb">Label</span>
	 	<span data-ch5-textcontent="currentSourceListen.typeFb">Label</span>
	 	<span data-ch5-textcontent="currentSourceListen.iconFb">Label</span>
	 		<ch5-button sendEventOnClick="currentSourceListen.play" receiveStateSelected="currentSourceListen.playFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentSourceListen.stop" receiveStateSelected="currentSourceListen.stopFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentSourceListen.pause" receiveStateSelected="currentSourceListen.pauseFb">
        	</ch5-button>
	 </div>
</template>
