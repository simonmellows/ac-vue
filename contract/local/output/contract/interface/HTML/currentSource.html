<template id="contract.currentSource.currentSource">
	<div id="currentSource.currentSource">
	 	<span data-ch5-textcontent="currentSource.labelFb">Label</span>
	 	<span data-ch5-textcontent="currentSource.typeFb">Label</span>
	 	<span data-ch5-textcontent="currentSource.iconFb">Label</span>
	 		<ch5-button sendEventOnClick="currentSource.play" receiveStateSelected="currentSource.playFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentSource.stop" receiveStateSelected="currentSource.stopFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentSource.pause" receiveStateSelected="currentSource.pauseFb">
        	</ch5-button>
	 </div>
</template>
