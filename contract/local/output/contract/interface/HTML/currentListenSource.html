<template id="contract.currentSource.currentListenSource">
	<div id="currentSource.currentListenSource">
	 	<span data-ch5-textcontent="currentListenSource.labelFb">Label</span>
	 	<span data-ch5-textcontent="currentListenSource.typeFb">Label</span>
	 	<span data-ch5-textcontent="currentListenSource.iconFb">Label</span>
	 		<ch5-button sendEventOnClick="currentListenSource.play" receiveStateSelected="currentListenSource.playFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentListenSource.stop" receiveStateSelected="currentListenSource.stopFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentListenSource.pause" receiveStateSelected="currentListenSource.pauseFb">
        	</ch5-button>
	 </div>
</template>
