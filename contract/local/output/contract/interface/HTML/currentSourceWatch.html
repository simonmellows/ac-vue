<template id="contract.currentSource.currentSourceWatch">
	<div id="currentSource.currentSourceWatch">
	 	<span data-ch5-textcontent="currentSourceWatch.labelFb">Label</span>
	 	<span data-ch5-textcontent="currentSourceWatch.typeFb">Label</span>
	 	<span data-ch5-textcontent="currentSourceWatch.iconFb">Label</span>
	 		<ch5-button sendEventOnClick="currentSourceWatch.play" receiveStateSelected="currentSourceWatch.playFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentSourceWatch.stop" receiveStateSelected="currentSourceWatch.stopFb">
        	</ch5-button>
	 		<ch5-button sendEventOnClick="currentSourceWatch.pause" receiveStateSelected="currentSourceWatch.pauseFb">
        	</ch5-button>
	 </div>
</template>
